<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asadbek Jaloldinov — Frontend Developer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a0f2e;
    --navy-mid: #111839;
    --navy-light: #1a2356;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --soft: #e8f0ff;
    --text: #0a0f2e;
    --muted: #6b7280;
    --white: #ffffff;
    --card-bg: rgba(255,255,255,0.7);
    --border: rgba(79,142,247,0.18);
    --bg: #f5f7ff;
    --nav-bg: rgba(245,247,255,0.85);
  }
  .dark {
    --text: #e8f0ff;
    --muted: #94a3b8;
    --white: #0a0f2e;
    --card-bg: rgba(17,24,57,0.7);
    --border: rgba(79,142,247,0.22);
    --bg: #070c22;
    --nav-bg: rgba(7,12,34,0.9);
    --soft: #1a2356;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background 0.4s, color 0.4s;
    overflow-x: hidden;
  }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

  /* Loader */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    transition: opacity 0.5s, visibility 0.5s;
  }
  #loader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-text {
    font-family: 'Syne', sans-serif;
    font-size: 2rem; font-weight: 800;
    color: white; letter-spacing: 0.05em;
  }
  .loader-bar {
    width: 200px; height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px; overflow: hidden;
  }
  .loader-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 10px;
    animation: loadFill 1.8s ease forwards;
  }
  @keyframes loadFill { from { width: 0%; } to { width: 100%; } }

  /* Navbar */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto;
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    cursor: pointer;
  }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-size: 0.875rem; font-weight: 500; color: var(--muted);
    text-decoration: none; transition: color 0.2s; cursor: pointer;
    letter-spacing: 0.03em;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .theme-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card-bg); cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: var(--text);
  }
  .theme-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
  .menu-btn {
    display: none; background: none; border: none;
    cursor: pointer; color: var(--text); font-size: 1.4rem;
  }
  .mobile-menu {
    display: none; flex-direction: column; gap: 4px;
    padding: 12px 24px 20px; border-top: 1px solid var(--border);
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    padding: 10px 0; font-size: 0.95rem; font-weight: 500;
    color: var(--muted); text-decoration: none; cursor: pointer;
    border-bottom: 1px solid var(--border); transition: color 0.2s;
  }
  .mobile-menu a:hover { color: var(--accent); }

  /* Hero */
  .hero {
    min-height: 100vh; padding-top: 64px;
    display: flex; align-items: center;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.25;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -100px; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; animation-delay: -3s; }
  .orb3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 40%; animation-delay: -5s; opacity: 0.12; }
  @keyframes orbFloat {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-40px) scale(1.05); }
  }
  .grid-lines {
    position: absolute; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.4;
  }
  .hero-content {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
    align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 16px; border-radius: 100px;
    background: var(--card-bg); border: 1px solid var(--border);
    font-size: 0.8rem; color: var(--accent); font-weight: 500; margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #22c55e;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.3)} }
  .hero-name {
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 800; line-height: 1.08;
    color: var(--text); margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .hero-name span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero-title {
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: var(--accent); font-weight: 600; margin-bottom: 20px;
    font-family: 'Syne', sans-serif; letter-spacing: 0.05em;
    text-transform: uppercase; font-size: 0.9rem;
  }
  .hero-desc {
    font-size: 1.05rem; color: var(--muted);
    line-height: 1.7; max-width: 500px; margin-bottom: 36px;
  }
  .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    padding: 13px 28px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; font-weight: 600; font-size: 0.95rem;
    border: none; cursor: pointer; transition: all 0.25s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(79,142,247,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,142,247,0.45); }
  .btn-secondary {
    padding: 13px 28px; border-radius: 10px;
    background: var(--card-bg); color: var(--text);
    border: 1px solid var(--border); font-weight: 600; font-size: 0.95rem;
    cursor: pointer; transition: all 0.25s; backdrop-filter: blur(8px);
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
  .hero-visual {
    display: flex; justify-content: center; align-items: center;
  }
  .avatar-wrap {
    position: relative; width: 340px; height: 340px;
  }
  .avatar-ring {
    position: absolute; inset: -12px; border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(135deg, var(--accent), var(--accent2)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: spin 12s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar-img {
    width: 340px; height: 340px; border-radius: 50%;
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 6rem; font-weight: 800;
    color: var(--accent); overflow: hidden; position: relative;
    border: 4px solid var(--card-bg);
  }
  .floating-chip {
    position: absolute; padding: 8px 14px; border-radius: 8px;
    background: var(--card-bg); border: 1px solid var(--border);
    backdrop-filter: blur(12px); font-size: 0.75rem; font-weight: 600;
    color: var(--text); display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    animation: float 4s ease-in-out infinite;
  }
  .chip1 { bottom: 30px; left: -30px; animation-delay: 0s; }
  .chip2 { top: 20px; right: -20px; animation-delay: -2s; }
  .chip3 { top: 50%; right: -40px; animation-delay: -1s; }
  @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
  .chip-dot { width: 8px; height: 8px; border-radius: 50%; }
  .hero-stats {
    display: flex; gap: 36px; margin-top: 48px; padding-top: 36px;
    border-top: 1px solid var(--border);
  }
  .stat-num {
    font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  /* Sections */
  section { padding: 100px 0; }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
  .section-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--accent); margin-bottom: 16px;
  }
  .section-tag::before {
    content: ''; width: 24px; height: 2px; background: var(--accent);
    border-radius: 2px;
  }
  .section-title {
    font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800;
    color: var(--text); letter-spacing: -0.02em; line-height: 1.15;
    margin-bottom: 16px;
  }
  .section-sub {
    font-size: 1rem; color: var(--muted); max-width: 520px; line-height: 1.7;
    margin-bottom: 64px;
  }

  /* About */
  .about-grid {
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; align-items: center;
  }
  .about-img {
    border-radius: 20px;
    background: linear-gradient(135deg, var(--navy-light), var(--navy));
    aspect-ratio: 4/5; display: flex; align-items: center; justify-content: center;
    font-size: 5rem; position: relative; overflow: hidden;
    border: 1px solid var(--border);
  }
  .about-img::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(79,142,247,0.1), rgba(124,58,237,0.1));
  }
  .about-text p { color: var(--muted); line-height: 1.8; margin-bottom: 20px; }
  .tech-pills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
  .pill {
    padding: 7px 16px; border-radius: 100px;
    background: var(--card-bg); border: 1px solid var(--border);
    font-size: 0.8rem; font-weight: 600; color: var(--text);
    transition: all 0.2s; cursor: default; backdrop-filter: blur(8px);
  }
  .pill:hover { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px); }

  /* Skills */
  .skills-bg { background: var(--soft); }
  .dark .skills-bg { background: var(--navy-mid); }
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
  .skill-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 20px;
    text-align: center; transition: all 0.3s;
    cursor: default; backdrop-filter: blur(8px);
    position: relative; overflow: hidden;
  }
  .skill-card::before {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0); transition: transform 0.3s;
  }
  .skill-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(79,142,247,0.15); border-color: var(--accent); }
  .skill-card:hover::before { transform: scaleX(1); }
  .skill-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  .skill-name { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .skill-bar-wrap { background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; }
  .skill-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 1s ease; }
  .skill-pct { font-size: 0.72rem; color: var(--muted); margin-top: 6px; font-weight: 500; }

  /* Projects */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 28px; }
  .project-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden; transition: all 0.3s;
    backdrop-filter: blur(8px);
  }
  .project-card:hover { transform: translateY(-8px); box-shadow: 0 20px 60px rgba(79,142,247,0.15); border-color: var(--accent); }
  .project-img {
    height: 200px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--navy-light), var(--navy));
    display: flex; align-items: center; justify-content: center; font-size: 4rem;
  }
  .project-overlay {
    position: absolute; inset: 0; background: linear-gradient(135deg, rgba(79,142,247,0.8), rgba(124,58,237,0.8));
    display: flex; align-items: center; justify-content: center; gap: 12px;
    opacity: 0; transition: opacity 0.3s;
  }
  .project-card:hover .project-overlay { opacity: 1; }
  .project-link {
    padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
    text-decoration: none; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .project-link.white { background: white; color: var(--navy); }
  .project-link.outline { background: transparent; color: white; border: 2px solid white; }
  .project-link:hover { transform: scale(1.05); }
  .project-body { padding: 24px; }
  .project-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .project-tag {
    padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 600;
    background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.2);
  }
  .project-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .project-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.6; }

  /* Timeline */
  .timeline { position: relative; padding-left: 40px; }
  .timeline::before {
    content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
    width: 2px; background: linear-gradient(180deg, var(--accent), var(--accent2));
    border-radius: 2px;
  }
  .timeline-item { position: relative; margin-bottom: 40px; }
  .timeline-dot {
    position: absolute; left: -34px; top: 4px;
    width: 14px; height: 14px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: 3px solid var(--bg); z-index: 1;
  }
  .timeline-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; transition: all 0.3s;
    backdrop-filter: blur(8px);
  }
  .timeline-card:hover { border-color: var(--accent); transform: translateX(4px); }
  .tl-date { font-size: 0.78rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .tl-title { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .tl-org { font-size: 0.875rem; color: var(--accent2); font-weight: 500; margin-bottom: 10px; }
  .tl-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.6; }

  /* Contact */
  .contact-bg { background: var(--soft); }
  .dark .contact-bg { background: var(--navy-mid); }
  .contact-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 60px; align-items: start; }
  .contact-info h3 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
  .contact-info p { color: var(--muted); line-height: 1.7; margin-bottom: 32px; }
  .social-links { display: flex; flex-direction: column; gap: 16px; }
  .social-link {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 12px;
    background: var(--card-bg); border: 1px solid var(--border);
    text-decoration: none; transition: all 0.25s; backdrop-filter: blur(8px);
  }
  .social-link:hover { border-color: var(--accent); transform: translateX(4px); box-shadow: 0 4px 20px rgba(79,142,247,0.15); }
  .social-icon { font-size: 1.2rem; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .social-name { font-weight: 600; font-size: 0.9rem; color: var(--text); }
  .social-handle { font-size: 0.8rem; color: var(--muted); }
  .contact-form { display: flex; flex-direction: column; gap: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.8rem; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }
  .form-group input, .form-group textarea {
    padding: 12px 16px; border-radius: 10px;
    background: var(--card-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    transition: all 0.25s; outline: none; resize: none; backdrop-filter: blur(8px);
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
  .form-group input::placeholder, .form-group textarea::placeholder { color: var(--muted); }

  /* Footer */
  footer {
    padding: 32px 0; border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .footer-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }
  .footer-logo { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .footer-copy { font-size: 0.82rem; color: var(--muted); }
  .footer-socials { display: flex; gap: 12px; }
  .footer-social { width: 36px; height: 36px; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1rem; transition: all 0.2s; }
  .footer-social:hover { background: var(--accent); border-color: var(--accent); transform: translateY(-2px); }

  /* Fade-in animations */
  .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }
  .fade-in-left { opacity: 0; transform: translateX(-30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .fade-in-left.visible { opacity: 1; transform: translateX(0); }
  .fade-in-right { opacity: 0; transform: translateX(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .fade-in-right.visible { opacity: 1; transform: translateX(0); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    padding: 14px 20px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; font-weight: 600; font-size: 0.9rem;
    box-shadow: 0 8px 30px rgba(79,142,247,0.4);
    transform: translateY(80px); opacity: 0;
    transition: all 0.4s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Responsive */
  @media (max-width: 900px) {
    .hero-content { grid-template-columns: 1fr; text-align: center; }
    .hero-btns { justify-content: center; }
    .hero-stats { justify-content: center; }
    .hero-desc { margin: 0 auto 36px; }
    .hero-visual { display: none; }
    .about-grid { grid-template-columns: 1fr; }
    .about-img { aspect-ratio: 16/7; max-width: 400px; margin: 0 auto; }
    .contact-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .footer-inner { flex-direction: column; text-align: center; }
    .nav-links { display: none; }
    .menu-btn { display: block; }
  }
  @media (max-width: 640px) {
    section { padding: 70px 0; }
    .projects-grid { grid-template-columns: 1fr; }
    .skills-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div id="loader">
  <div class="loader-text">AJ.</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>
<div id="root"></div>
<div class="toast" id="toast">✅ Message sent! I'll be in touch soon.</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// --- DATA ---
const skills = [
  { name: 'HTML5', icon: '🌐', level: 95 },
  { name: 'CSS3', icon: '🎨', level: 90 },
  { name: 'JavaScript', icon: '⚡', level: 88 },
  { name: 'React', icon: '⚛️', level: 85 },
  { name: 'TypeScript', icon: '🔷', level: 75 },
  { name: 'Tailwind', icon: '💨', level: 88 },
  { name: 'Git', icon: '🌿', level: 82 },
  { name: 'Next.js', icon: '▲', level: 70 },
  { name: 'Node.js', icon: '🟢', level: 60 },
  { name: 'Figma', icon: '🎭', level: 72 },
  { name: 'AI Tools', icon: '🤖', level: 80 },
  { name: 'REST APIs', icon: '🔗', level: 78 },
];

const projects = [
  { emoji: '🛒', title: 'ShopFlow E-Commerce', desc: 'Full-featured e-commerce platform with cart, checkout, and admin dashboard. Blazing fast UX.', tags: ['React', 'Node.js', 'MongoDB'], demo: '#', github: '#' },
  { emoji: '📊', title: 'DataViz Dashboard', desc: 'Real-time analytics dashboard with interactive charts, filters, and dark/light mode.', tags: ['React', 'Recharts', 'REST API'], demo: '#', github: '#' },
  { emoji: '💬', title: 'ChatSphere', desc: 'Real-time chat application with rooms, direct messages, and emoji reactions.', tags: ['React', 'Socket.io', 'Express'], demo: '#', github: '#' },
  { emoji: '📝', title: 'Notion Clone', desc: 'Collaborative note-taking app with rich-text editing, nested pages, and sharing.', tags: ['Next.js', 'TypeScript', 'Supabase'], demo: '#', github: '#' },
  { emoji: '🌦️', title: 'WeatherNow', desc: 'Beautiful weather app with animated forecasts, location detection, and 7-day outlook.', tags: ['React', 'OpenWeather API', 'Tailwind'], demo: '#', github: '#' },
  { emoji: '🎵', title: 'Melodia Music Player', desc: 'Sleek music player with waveform visualization, playlists, and audio effects.', tags: ['React', 'Web Audio API', 'Framer Motion'], demo: '#', github: '#' },
];

const timeline = [
  { date: '2024 — Present', title: 'Frontend Developer (Freelance)', org: 'Self-Employed', desc: 'Building modern web applications for clients worldwide. Specializing in React, Next.js, and responsive UI/UX design.' },
  { date: '2023 — 2024', title: 'Web Development Bootcamp', org: 'Najot Ta\'lim, Tashkent', desc: 'Intensive full-stack web development training covering JavaScript, React, Node.js, and databases. Graduated top of class.' },
  { date: '2022 — 2023', title: 'Self-Taught Frontend Journey', org: 'Online Platforms (freeCodeCamp, Udemy)', desc: 'Mastered HTML, CSS, JavaScript, and React through self-study. Built 20+ personal projects.' },
  { date: '2020 — 2024', title: 'Bachelor\'s Degree, Computer Science', org: 'Tashkent University of Information Technologies', desc: 'Studying computer science fundamentals, algorithms, data structures, and software engineering.' },
  { date: '2020', title: 'First Line of Code', org: 'High School, Tashkent', desc: 'Wrote first HTML page. Fell in love with web development and decided to pursue it as a career.' },
];

// --- HOOKS ---
function useScrollFade() {
  useEffect(() => {
    const els = document.querySelectorAll('.fade-in, .fade-in-left, .fade-in-right');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), (e.target.dataset.delay || 0) * 1);
        }
      });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useSkillAnim() {
  useEffect(() => {
    const bars = document.querySelectorAll('.skill-bar');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.width = e.target.dataset.width + '%';
        }
      });
    }, { threshold: 0.3 });
    bars.forEach(b => { b.style.width = '0%'; obs.observe(b); });
    return () => obs.disconnect();
  }, []);
}

// --- COMPONENTS ---
function Navbar({ dark, setDark }) {
  const [mobileOpen, setMobileOpen] = useState(false);
  const links = ['About', 'Skills', 'Projects', 'Experience', 'Contact'];
  const scrollTo = (id) => {
    document.getElementById(id.toLowerCase())?.scrollIntoView({ behavior: 'smooth' });
    setMobileOpen(false);
  };
  return (
    <nav>
      <div className="nav-inner">
        <div className="nav-logo" onClick={() => window.scrollTo({top:0,behavior:'smooth'})}>AJ.</div>
        <ul className="nav-links">
          {links.map(l => <li key={l}><a onClick={() => scrollTo(l)}>{l}</a></li>)}
        </ul>
        <div className="nav-right">
          <button className="theme-btn" onClick={() => setDark(!dark)}>{dark ? '☀️' : '🌙'}</button>
          <button className="menu-btn" onClick={() => setMobileOpen(!mobileOpen)}>☰</button>
        </div>
      </div>
      <div className={`mobile-menu ${mobileOpen ? 'open' : ''}`}>
        {links.map(l => <a key={l} onClick={() => scrollTo(l)}>{l}</a>)}
      </div>
    </nav>
  );
}

function Hero() {
  return (
    <section className="hero" id="hero">
      <div className="hero-bg">
        <div className="grid-lines"></div>
        <div className="orb orb1"></div>
        <div className="orb orb2"></div>
        <div className="orb orb3"></div>
      </div>
      <div className="hero-content">
        <div>
          <div className="hero-badge fade-in" data-delay="0">
            <span className="status-dot"></span>
            Available for new projects
          </div>
          <div className="hero-title fade-in" data-delay="100">Frontend Developer | React Specialist</div>
          <h1 className="hero-name fade-in" data-delay="150">
            Hi, I'm <span>Asadbek</span><br/>Jaloldinov
          </h1>
          <p className="hero-desc fade-in" data-delay="200">
            I craft blazing-fast, pixel-perfect web experiences that users love. Turning ideas into elegant, responsive, and accessible digital products.
          </p>
          <div className="hero-btns fade-in" data-delay="250">
            <a className="btn-primary" onClick={() => document.getElementById('projects')?.scrollIntoView({behavior:'smooth'})}>
              🚀 View Projects
            </a>
            <a className="btn-secondary" onClick={() => document.getElementById('contact')?.scrollIntoView({behavior:'smooth'})}>
              ✉️ Contact Me
            </a>
          </div>
          <div className="hero-stats fade-in" data-delay="300">
            {[['20+','Projects Built'],['1+','Years Experience'],['100%','Client Satisfaction']].map(([n,l]) => (
              <div key={l}>
                <div className="stat-num">{n}</div>
                <div className="stat-label">{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="hero-visual fade-in-right" data-delay="150">
          <div className="avatar-wrap">
            <div className="avatar-ring"></div>
            <div className="avatar-img">AJ</div>
            <div className="floating-chip chip1">
              <span className="chip-dot" style={{background:'#22c55e'}}></span>
              React Dev
            </div>
            <div className="floating-chip chip2">⚛️ React 18</div>
            <div className="floating-chip chip3">⚡ Fast & Clean</div>
          </div>
        </div>
      </div>
    </section>
  );
}

function About() {
  const techs = ['HTML5','CSS3','JavaScript','React','TypeScript','Next.js','Tailwind CSS','Git & GitHub','REST APIs','Figma','AI Tools','Node.js'];
  return (
    <section id="about">
      <div className="container">
        <div className="about-grid">
          <div className="fade-in-left">
            <div className="about-img">👨‍💻</div>
          </div>
          <div className="fade-in-right">
            <div className="section-tag">About Me</div>
            <h2 className="section-title">Building the<br/>web, one pixel at<br/>a time.</h2>
            <div className="about-text">
              <p>I'm Asadbek, a passionate Frontend Developer from Tashkent, Uzbekistan. I specialize in building modern, performant, and beautiful web applications using React and its ecosystem.</p>
              <p>My journey started in 2020 when I wrote my first HTML page. Since then, I've been on an obsessive quest to master the craft of web development — from pixel-perfect layouts to optimized React architectures.</p>
              <p>My goal is to grow into a world-class Frontend Engineer, working on products used by millions and mentoring the next generation of developers in Uzbekistan.</p>
            </div>
            <div className="tech-pills">
              {techs.map(t => <span className="pill" key={t}>{t}</span>)}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Skills() {
  useSkillAnim();
  return (
    <section id="skills" className="skills-bg">
      <div className="container">
        <div style={{textAlign:'center'}} className="fade-in">
          <div className="section-tag" style={{justifyContent:'center'}}>Skills</div>
          <h2 className="section-title">Tools I Work With</h2>
          <p className="section-sub" style={{margin:'0 auto 64px'}}>From crafting UI components to deploying production apps — here's my full technical arsenal.</p>
        </div>
        <div className="skills-grid">
          {skills.map((s, i) => (
            <div className="skill-card fade-in" key={s.name} data-delay={i * 50}>
              <span className="skill-icon">{s.icon}</span>
              <div className="skill-name">{s.name}</div>
              <div className="skill-bar-wrap">
                <div className="skill-bar" data-width={s.level}></div>
              </div>
              <div className="skill-pct">{s.level}%</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Projects() {
  return (
    <section id="projects">
      <div className="container">
        <div className="fade-in">
          <div className="section-tag">Projects</div>
          <h2 className="section-title">Featured Work</h2>
          <p className="section-sub">A selection of projects that showcase my skills, creativity, and attention to detail.</p>
        </div>
        <div className="projects-grid">
          {projects.map((p, i) => (
            <div className="project-card fade-in" key={p.title} data-delay={i * 80}>
              <div className="project-img">
                <span>{p.emoji}</span>
                <div className="project-overlay">
                  <a href={p.demo} className="project-link white">🔗 Live Demo</a>
                  <a href={p.github} className="project-link outline">⭐ GitHub</a>
                </div>
              </div>
              <div className="project-body">
                <div className="project-tags">{p.tags.map(t => <span className="project-tag" key={t}>{t}</span>)}</div>
                <div className="project-title">{p.title}</div>
                <div className="project-desc">{p.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Experience() {
  return (
    <section id="experience" style={{background:'var(--soft)'}}>
      <div className="container">
        <div className="fade-in">
          <div className="section-tag">Experience & Education</div>
          <h2 className="section-title">My Journey</h2>
          <p className="section-sub">The path that shaped me as a developer — from first-time coder to professional engineer.</p>
        </div>
        <div style={{maxWidth:'700px'}}>
          <div className="timeline">
            {timeline.map((t, i) => (
              <div className="timeline-item fade-in" key={i} data-delay={i * 100}>
                <div className="timeline-dot"></div>
                <div className="timeline-card">
                  <div className="tl-date">{t.date}</div>
                  <div className="tl-title">{t.title}</div>
                  <div className="tl-org">📍 {t.org}</div>
                  <div className="tl-desc">{t.desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function Contact() {
  const [form, setForm] = useState({name:'',email:'',subject:'',message:''});
  const showToast = () => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  };
  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.name || !form.email || !form.message) return;
    showToast();
    setForm({name:'',email:'',subject:'',message:''});
  };
  const socials = [
    { icon: '✈️', bg: '#229ED9', name: 'Telegram', handle: '@asadbek_dev', href: '#' },
    { icon: '🐙', bg: '#333', name: 'GitHub', handle: 'github.com/asadbek', href: '#' },
    { icon: '💼', bg: '#0A66C2', name: 'LinkedIn', handle: 'linkedin.com/in/asadbek', href: '#' },
  ];
  return (
    <section id="contact" className="contact-bg">
      <div className="container">
        <div className="fade-in">
          <div className="section-tag">Contact</div>
          <h2 className="section-title">Let's Work Together</h2>
          <p className="section-sub">Have a project in mind? I'd love to hear about it. Let's build something great together.</p>
        </div>
        <div className="contact-grid">
          <div className="fade-in-left">
            <div className="contact-info">
              <h3>Get in touch 👋</h3>
              <p>Whether you have a project, an opportunity, or just want to chat about web development — my inbox is always open.</p>
            </div>
            <div className="social-links">
              {socials.map(s => (
                <a key={s.name} href={s.href} className="social-link">
                  <div className="social-icon" style={{background: s.bg + '22', fontSize:'1.2rem'}}>{s.icon}</div>
                  <div>
                    <div className="social-name">{s.name}</div>
                    <div className="social-handle">{s.handle}</div>
                  </div>
                  <span style={{marginLeft:'auto', color:'var(--muted)'}}>→</span>
                </a>
              ))}
            </div>
          </div>
          <div className="fade-in-right">
            <form className="contact-form" onSubmit={handleSubmit}>
              <div className="form-row">
                <div className="form-group">
                  <label>Name</label>
                  <input placeholder="John Doe" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                </div>
                <div className="form-group">
                  <label>Email</label>
                  <input type="email" placeholder="john@example.com" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                </div>
              </div>
              <div className="form-group">
                <label>Subject</label>
                <input placeholder="Project Collaboration" value={form.subject} onChange={e => setForm({...form, subject: e.target.value})} />
              </div>
              <div className="form-group">
                <label>Message</label>
                <textarea rows="5" placeholder="Tell me about your project..." value={form.message} onChange={e => setForm({...form, message: e.target.value})}></textarea>
              </div>
              <button type="submit" className="btn-primary" style={{width:'100%', justifyContent:'center', padding:'15px'}}>
                🚀 Send Message
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  );
}

function Footer() {
  const socials = ['✈️','🐙','💼','🐦'];
  return (
    <footer>
      <div className="footer-inner">
        <div className="footer-logo">AJ.</div>
        <div className="footer-copy">© 2024 Asadbek Jaloldinov. Crafted with ❤️ in Tashkent</div>
        <div className="footer-socials">
          {socials.map((s, i) => <a key={i} href="#" className="footer-social">{s}</a>)}
        </div>
      </div>
    </footer>
  );
}

function App() {
  const [dark, setDark] = useState(false);
  useScrollFade();

  useEffect(() => {
    document.body.className = dark ? 'dark' : '';
  }, [dark]);

  useEffect(() => {
    setTimeout(() => {
      document.getElementById('loader')?.classList.add('hide');
    }, 2000);
  }, []);

  return (
    <>
      <Navbar dark={dark} setDark={setDark} />
      <Hero />
      <About />
      <Skills />
      <Projects />
      <Experience />
      <Contact />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
